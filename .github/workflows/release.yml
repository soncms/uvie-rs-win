name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\uvie-rs-win.exe dist\uvie-rs-win.exe
          Copy-Item README.md dist\README.md
          Compress-Archive -Path dist\* -DestinationPath uvie-rs-win-windows-x86_64.zip -Force

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            uvie-rs-win-windows-x86_64.zip `
            target\release\uvie-rs-win.exe `
            --repo $env:GITHUB_REPOSITORY `
            --title $env:GITHUB_REF_NAME `
            --generate-notes
